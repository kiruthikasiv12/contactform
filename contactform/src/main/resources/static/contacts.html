<!doctype html>
<html>
  <head>
    <title>Contacts Dashboard</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 30px;
      }

      h1 {
        text-align: center;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
      }

      th {
        background: #007bff;
        color: white;
      }

      tr:nth-child(even) {
        background: #f9f9f9;
      }
    </style>
  </head>

  <body>
    <h1>Contact Management Dashboard</h1>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Message</th>
        </tr>
      </thead>

      <tbody id="contactTable"></tbody>
    </table>
    <script>
      fetch("/contacts")
        .then((response) => response.json())
        .then((data) => {
          let table = document.getElementById("contactTable");

          data.forEach((contact) => {
            let row = `
                <tr>
                    <td>${contact.id}</td>
                    <td>${contact.name}</td>
                    <td>${contact.email}</td>
                    <td>${contact.message}</td>
                </tr>
            `;

            table.innerHTML += row;
          });
        });
    </script>
  </body>
</html>
